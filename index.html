 <body class="h-full bg-[#0a0e1a] text-[#c0c8e0] font-rajdhani overflow-auto">
  <div id="app" class="h-full w-full"></div>
  <div id="toast-container" class="toast-container"></div>
  <div id="modal-root"></div>
  <script>
// ========== STATE ==========
let appState = {
  view: 'landing', // landing, login, signup, dashboard
  currentUser: null,
  units: [],
  weeks: [],
  works: [],
  users: [],
  selectedUnit: null,
  selectedWeek: null,
  sidebarOpen: true,
  allData: []
};

const defaultConfig = {
  app_title: 'PORTAL ACADÉMICO',
  welcome_text: 'Explora el conocimiento como nunca antes',
  background_color: '#0a0e1a',
  surface_color: '#0d1225',
  text_color: '#c0c8e0',
  primary_action_color: '#00f0ff',
  secondary_action_color: '#ff00e5'
};

// Admin seed
const ADMIN_EMAIL = 'admin@portal.com';
const ADMIN_PASS = 'admin123';

// ========== TOAST ==========
function showToast(msg, type = 'success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
}

// ========== DATA SDK ==========
let allRecords = [];

const dataHandler = {
  onDataChanged(data) {
    allRecords = data;
    appState.allData = data;
    appState.users = data.filter(r => r.type === 'user');
    appState.units = data.filter(r => r.type === 'unit').sort((a,b) => (a.unit_number||0)-(b.unit_number||0));
    appState.weeks = data.filter(r => r.type === 'week').sort((a,b) => (a.week_number||0)-(b.week_number||0));
    appState.works = data.filter(r => r.type === 'work');

    // Check admin exists
    const adminExists = appState.users.some(u => u.email === ADMIN_EMAIL && u.role === 'admin');
    if (!adminExists && !window._adminCreating) {
      window._adminCreating = true;
      // We cannot create in onDataChanged, so we flag it
      window._needsAdminSeed = true;
    }

    renderCurrentView();
  }
};

async function initApp() {
  const result = await window.dataSdk.init(dataHandler);
  if (!result.isOk) {
    console.error('SDK init failed');
  }
}
initApp();

// We handle admin creation via a user-triggered mechanism or initial check
// Since we can't seed in onDataChanged, admin is pre-defined as a credential check only
// We'll use a virtual admin: no DB record needed, just hardcoded credentials

// ========== AUTH HELPERS ==========
function isAdmin() {
  return appState.currentUser && appState.currentUser.role === 'admin';
}

// ========== RENDER ENGINE ==========
function renderCurrentView() {
  const app = document.getElementById('app');
  switch(appState.view) {
    case 'landing': renderLanding(app); break;
    case 'login': renderLogin(app); break;
    case 'signup': renderSignup(app); break;
    case 'dashboard': renderDashboard(app); break;
  }
  lucide.createIcons();
}

function navigate(view) {
  appState.view = view;
  renderCurrentView();
}

// ========== LANDING PAGE ==========
function renderLanding(container) {
  const cfg = window.elementSdk?.config || defaultConfig;
  const units = appState.units;
  container.innerHTML = `
    <div class="h-full w-full flex flex-col" style="background:${cfg.background_color}">
      <!-- Header -->
      <header class="relative px-6 py-4 flex items-center justify-between border-b border-[#00f0ff20]" style="background:${cfg.surface_color}">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,${cfg.primary_action_color},${cfg.secondary_action_color})">
            <i data-lucide="gamepad-2" class="w-5 h-5" style="color:${cfg.background_color}"></i>
          </div>
          <h1 class="font-orbitron text-lg font-bold tracking-wider" style="color:${cfg.primary_action_color}">${cfg.app_title}</h1>
        </div>
        <div class="flex gap-3">
          <button onclick="navigate('login')" class="btn-cyber px-5 py-2 rounded-lg text-sm font-orbitron">
            <i data-lucide="log-in" class="w-4 h-4 inline mr-1"></i> INGRESAR
          </button>
        </div>
      </header>

      <!-- Hero -->
      <div class="relative px-6 py-12 text-center">
        <div class="absolute inset-0 overflow-hidden pointer-events-none">
          ${[...Array(8)].map((_,i) => `<div class="particle" style="left:${10+i*12}%;top:${20+Math.random()*60}%;animation-delay:${i*0.5}s"></div>`).join('')}
        </div>
        <h2 class="font-orbitron text-3xl md:text-5xl font-black mb-4 relative" style="background:linear-gradient(90deg,${cfg.primary_action_color},${cfg.secondary_action_color});-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
          ${cfg.welcome_text}
        </h2>
        <p class="text-lg opacity-70 max-w-xl mx-auto" style="color:${cfg.text_color}">Navega por las unidades académicas y descubre el contenido organizado por semanas.</p>
        <div class="flex justify-center gap-4 mt-8">
          <button onclick="navigate('login')" class="btn-cyber-primary px-8 py-3 rounded-lg font-orbitron text-sm">
            <i data-lucide="shield" class="w-4 h-4 inline mr-2"></i>INICIAR SESIÓN
          </button>
          <button onclick="navigate('signup')" class="btn-cyber px-8 py-3 rounded-lg text-sm font-orbitron">
            <i data-lucide="user-plus" class="w-4 h-4 inline mr-2"></i>REGISTRARSE
          </button>
        </div>
      </div>

      <!-- Units Grid -->
      <div class="flex-1 overflow-auto px-6 pb-8">
        <h3 class="font-orbitron text-xl font-bold mb-6 flex items-center gap-2" style="color:${cfg.primary_action_color}">
          <i data-lucide="layers" class="w-5 h-5"></i> UNIDADES DISPONIBLES
        </h3>
        ${units.length === 0 ? `
          <div class="text-center py-16 opacity-50">
            <i data-lucide="package" class="w-16 h-16 mx-auto mb-4" style="color:${cfg.primary_action_color}30"></i>
            <p class="font-orbitron text-sm">NO HAY UNIDADES CREADAS AÚN</p>
            <p class="text-sm mt-2">Un administrador debe agregar contenido</p>
          </div>
        ` : `
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
            ${units.map((u, i) => `
              <div class="gaming-card rounded-xl p-5 slide-in" style="animation-delay:${i*0.1}s">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-12 h-12 rounded-lg flex items-center justify-center font-orbitron font-black text-lg" style="background:linear-gradient(135deg,${cfg.primary_action_color}20,${cfg.secondary_action_color}20);color:${cfg.primary_action_color}">
                    ${u.unit_number || '?'}
                  </div>
                  <div>
                    <h4 class="font-orbitron font-bold text-sm" style="color:${cfg.primary_action_color}">${u.unit_name || 'Sin nombre'}</h4>
                    <p class="text-xs opacity-60">4 Semanas</p>
                  </div>
                </div>
                <p class="text-sm opacity-70 mb-4 line-clamp-2">${u.unit_description || 'Sin descripción'}</p>
                <div class="flex gap-2">
                  <span class="text-xs px-3 py-1 rounded-full font-orbitron" style="background:${cfg.primary_action_color}15;color:${cfg.primary_action_color};border:1px solid ${cfg.primary_action_color}30">
                    ${appState.weeks.filter(w => w.parent_id === u.__backendId).length} semanas
                  </span>
                  <span class="text-xs px-3 py-1 rounded-full font-orbitron" style="background:${cfg.secondary_action_color}15;color:${cfg.secondary_action_color};border:1px solid ${cfg.secondary_action_color}30">
                    ${appState.works.filter(w => {
                      const weekIds = appState.weeks.filter(wk => wk.parent_id === u.__backendId).map(wk => wk.__backendId);
                      return weekIds.includes(w.parent_id);
                    }).length} trabajos
                  </span>
                </div>
              </div>
            `).join('')}
          </div>
        `}
      </div>
    </div>
  `;
}

// ========== LOGIN ==========
function renderLogin(container) {
  const cfg = window.elementSdk?.config || defaultConfig;
  container.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4" style="background:${cfg.background_color}">
      <div class="gaming-card rounded-2xl p-8 w-full max-w-md slide-in">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-4" style="background:linear-gradient(135deg,${cfg.primary_action_color},${cfg.secondary_action_color})">
            <i data-lucide="shield-check" class="w-8 h-8" style="color:${cfg.background_color}"></i>
          </div>
          <h2 class="font-orbitron text-2xl font-black" style="color:${cfg.primary_action_color}">INICIAR SESIÓN</h2>
          <p class="text-sm opacity-60 mt-1">Accede al portal académico</p>
        </div>
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-xs font-orbitron mb-1 uppercase tracking-wider" style="color:${cfg.primary_action_color}" for="login-email">Email</label>
            <input id="login-email" type="email" class="input-cyber w-full px-4 py-3 rounded-lg text-sm" placeholder="correo@ejemplo.com" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1 uppercase tracking-wider" style="color:${cfg.primary_action_color}" for="login-pass">Contraseña</label>
            <input id="login-pass" type="password" class="input-cyber w-full px-4 py-3 rounded-lg text-sm" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-cyber-primary w-full py-3 rounded-lg font-orbitron text-sm">INGRESAR</button>
        </form>
        <div class="mt-6 flex flex-col gap-3 text-center">
          <button onclick="navigate('signup')" class="text-sm hover:underline" style="color:${cfg.secondary_action_color}">¿No tienes cuenta? Regístrate</button>
          <button onclick="navigate('landing')" class="btn-cyber px-4 py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="arrow-left" class="w-3 h-3 inline mr-1"></i> VER UNIDADES SIN CUENTA
          </button>
        </div>
        <div class="mt-4 p-3 rounded-lg text-xs opacity-50 text-center" style="background:${cfg.primary_action_color}08;border:1px solid ${cfg.primary_action_color}15">
          Admin: admin@portal.com / admin123
        </div>
      </div>
    </div>
  `;
  document.getElementById('login-form').addEventListener('submit', handleLogin);
}

async function handleLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;

  // Check admin
  if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
    appState.currentUser = { name: 'Administrador', email: ADMIN_EMAIL, role: 'admin' };
    showToast('¡Bienvenido Administrador!');
    navigate('dashboard');
    return;
  }

  // Check registered users
  const user = appState.users.find(u => u.email === email && u.password === pass);
  if (user) {
    appState.currentUser = { name: user.name, email: user.email, role: user.role || 'viewer' };
    showToast(`¡Bienvenido ${user.name}!`);
    navigate('dashboard');
  } else {
    showToast('Credenciales incorrectas', 'error');
  }
}

// ========== SIGNUP ==========
function renderSignup(container) {
  const cfg = window.elementSdk?.config || defaultConfig;
  container.innerHTML = `
    <div class="h-full w-full flex items-center justify-center p-4" style="background:${cfg.background_color}">
      <div class="gaming-card rounded-2xl p-8 w-full max-w-md slide-in">
        <div class="text-center mb-8">
          <div class="w-16 h-16 mx-auto rounded-xl flex items-center justify-center mb-4" style="background:linear-gradient(135deg,${cfg.secondary_action_color},${cfg.primary_action_color})">
            <i data-lucide="user-plus" class="w-8 h-8" style="color:${cfg.background_color}"></i>
          </div>
          <h2 class="font-orbitron text-2xl font-black" style="color:${cfg.primary_action_color}">REGISTRARSE</h2>
          <p class="text-sm opacity-60 mt-1">Crea tu cuenta de visualizador</p>
        </div>
        <form id="signup-form" class="space-y-4">
          <div>
            <label class="block text-xs font-orbitron mb-1 uppercase tracking-wider" style="color:${cfg.primary_action_color}" for="signup-name">Nombre</label>
            <input id="signup-name" type="text" class="input-cyber w-full px-4 py-3 rounded-lg text-sm" placeholder="Tu nombre" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1 uppercase tracking-wider" style="color:${cfg.primary_action_color}" for="signup-email">Email</label>
            <input id="signup-email" type="email" class="input-cyber w-full px-4 py-3 rounded-lg text-sm" placeholder="correo@ejemplo.com" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1 uppercase tracking-wider" style="color:${cfg.primary_action_color}" for="signup-pass">Contraseña</label>
            <input id="signup-pass" type="password" class="input-cyber w-full px-4 py-3 rounded-lg text-sm" placeholder="Mínimo 6 caracteres" required minlength="6">
          </div>
          <button type="submit" id="signup-btn" class="btn-cyber-primary w-full py-3 rounded-lg font-orbitron text-sm">CREAR CUENTA</button>
        </form>
        <div class="mt-6 flex flex-col gap-3 text-center">
          <button onclick="navigate('login')" class="text-sm hover:underline" style="color:${cfg.secondary_action_color}">¿Ya tienes cuenta? Inicia sesión</button>
          <button onclick="navigate('landing')" class="btn-cyber px-4 py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="arrow-left" class="w-3 h-3 inline mr-1"></i> VER UNIDADES SIN CUENTA
          </button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('signup-form').addEventListener('submit', handleSignup);
}

async function handleSignup(e) {
  e.preventDefault();
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const btn = document.getElementById('signup-btn');

  if (email === ADMIN_EMAIL) {
    showToast('Este correo está reservado', 'error');
    return;
  }

  if (appState.users.some(u => u.email === email)) {
    showToast('Este correo ya está registrado', 'error');
    return;
  }

  if (allRecords.length >= 999) {
    showToast('Se alcanzó el límite de registros', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'CREANDO...';

  const result = await window.dataSdk.create({
    type: 'user', name, email, password: pass, role: 'viewer',
    unit_id: '', unit_name: '', unit_number: 0, unit_description: '',
    week_id: '', week_number: 0, work_title: '', work_description: '',
    work_date: '', work_link: '', work_file_name: '', work_file_data: '', parent_id: ''
  });

  btn.disabled = false;
  btn.textContent = 'CREAR CUENTA';

  if (result.isOk) {
    showToast('¡Cuenta creada! Inicia sesión');
    navigate('login');
  } else {
    showToast('Error al crear cuenta', 'error');
  }
}

// ========== DASHBOARD ==========
function renderDashboard(container) {
  const cfg = window.elementSdk?.config || defaultConfig;
  const admin = isAdmin();

  container.innerHTML = `
    <div class="h-full w-full flex" style="background:${cfg.background_color}">
      <!-- Sidebar -->
      <aside id="sidebar" class="w-64 flex-shrink-0 flex flex-col border-r border-[#00f0ff15] transition-all duration-300 ${appState.sidebarOpen ? '' : 'hidden md:flex'}" style="background:${cfg.surface_color}">
        <div class="p-4 border-b border-[#00f0ff15]">
          <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,${cfg.primary_action_color},${cfg.secondary_action_color})">
              <i data-lucide="gamepad-2" class="w-4 h-4" style="color:${cfg.background_color}"></i>
            </div>
            <span class="font-orbitron text-xs font-bold" style="color:${cfg.primary_action_color}">${cfg.app_title}</span>
          </div>
        </div>

        <!-- User Info -->

            </div>
            <div>
              <p class="text-xs font-bold">${appState.currentUser?.name || 'Usuario'}</p>
              <p class="text-[10px] font-orbitron uppercase" style="color:${admin ? cfg.secondary_action_color : cfg.primary_action_color}">${admin ? 'ADMIN' : 'VIEWER'}</p>
            </div>
          </div>
        </div>

        <!-- Nav -->
        <nav class="flex-1 overflow-auto p-2">
          <p class="text-[10px] font-orbitron uppercase tracking-widest px-3 py-2 opacity-40">UNIDADES</p>
          ${appState.units.map(u => `
            <button onclick="selectUnit('${u.__backendId}')" class="sidebar-item w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 ${appState.selectedUnit === u.__backendId ? 'active' : ''}">
              <i data-lucide="folder" class="w-4 h-4"></i>
              <span class="truncate">Unidad ${u.unit_number}: ${u.unit_name || ''}</span>
            </button>
          `).join('')}
          ${admin ? `
            <button onclick="showAddUnitModal()" class="w-full text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2 mt-2 opacity-60 hover:opacity-100 transition-opacity" style="color:${cfg.primary_action_color}">
              <i data-lucide="plus-circle" class="w-4 h-4"></i> Agregar Unidad
            </button>
          ` : ''}
        </nav>

        <!-- Logout -->
        <div class="p-3 border-t border-[#00f0ff15]">
          <button onclick="navigate('landing'); appState.currentUser=null; appState.selectedUnit=null; appState.selectedWeek=null;" class="btn-cyber w-full py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="log-out" class="w-3 h-3 inline mr-1"></i> SALIR
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Top Bar -->
        <header class="px-4 py-3 flex items-center gap-3 border-b border-[#00f0ff15]" style="background:${cfg.surface_color}">
          <button onclick="appState.sidebarOpen=!appState.sidebarOpen;renderCurrentView();" class="md:hidden p-2 rounded-lg hover:bg-[#00f0ff10]">
            <i data-lucide="menu" class="w-5 h-5"></i>
          </button>
          <div class="flex-1">
            <h2 class="font-orbitron text-sm font-bold" style="color:${cfg.primary_action_color}">
              ${appState.selectedUnit ? 'UNIDAD ' + (appState.units.find(u => u.__backendId === appState.selectedUnit)?.unit_number || '') : 'DASHBOARD'}
            </h2>
          </div>
          <button onclick="navigate('landing'); appState.currentUser=null; appState.selectedUnit=null; appState.selectedWeek=null;" class="btn-cyber px-3 py-1.5 rounded-lg text-xs font-orbitron">
            <i data-lucide="home" class="w-3 h-3 inline mr-1"></i> INICIO
          </button>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-auto p-4 md:p-6" id="main-content">
          ${renderMainContent(cfg, admin)}
        </div>
      </main>
    </div>
  `;
}

function renderMainContent(cfg, admin) {
  if (!appState.selectedUnit) {
    // Welcome screen
    return `
      <div class="text-center py-16 slide-in">
        <div class="w-20 h-20 mx-auto rounded-2xl flex items-center justify-center mb-6 glow-pulse" style="background:linear-gradient(135deg,${cfg.primary_action_color}20,${cfg.secondary_action_color}20);border:1px solid ${cfg.primary_action_color}30">
          <i data-lucide="book-open" class="w-10 h-10" style="color:${cfg.primary_action_color}"></i>
        </div>
        <h3 class="font-orbitron text-xl font-bold mb-2" style="color:${cfg.primary_action_color}">SELECCIONA UNA UNIDAD</h3>
        <p class="opacity-60 text-sm">Elige una unidad del panel lateral para ver su contenido</p>
        ${appState.units.length === 0 && admin ? `
          <button onclick="showAddUnitModal()" class="btn-cyber-primary px-6 py-3 rounded-lg font-orbitron text-sm mt-8">
            <i data-lucide="plus" class="w-4 h-4 inline mr-2"></i>CREAR PRIMERA UNIDAD
          </button>
        ` : ''}
      </div>
    `;
  }

  const unit = appState.units.find(u => u.__backendId === appState.selectedUnit);
  if (!unit) return '<p>Unidad no encontrada</p>';

  const weeks = appState.weeks.filter(w => w.parent_id === appState.selectedUnit);

  // Show selected week's works or week overview
  if (appState.selectedWeek) {
    const week = weeks.find(w => w.__backendId === appState.selectedWeek);
    if (!week) return '';
    const works = appState.works.filter(w => w.parent_id === appState.selectedWeek);

    return `
      <div class="slide-in">
        <button onclick="appState.selectedWeek=null;renderCurrentView();" class="btn-cyber px-3 py-1.5 rounded-lg text-xs font-orbitron mb-4">
          <i data-lucide="arrow-left" class="w-3 h-3 inline mr-1"></i> VOLVER A SEMANAS
        </button>
        <div class="flex items-center justify-between mb-6">
          <h3 class="font-orbitron text-lg font-bold" style="color:${cfg.primary_action_color}">
            SEMANA ${week.week_number}
          </h3>
          ${admin ? `<button onclick="showAddWorkModal('${week.__backendId}')" class="btn-cyber-primary px-4 py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="plus" class="w-3 h-3 inline mr-1"></i> AGREGAR TRABAJO
          </button>` : ''}
        </div>
        ${works.length === 0 ? `
          <div class="text-center py-12 opacity-50">
            <i data-lucide="file-x" class="w-12 h-12 mx-auto mb-3" style="color:${cfg.primary_action_color}30"></i>
            <p class="font-orbitron text-xs">NO HAY TRABAJOS EN ESTA SEMANA</p>
          </div>
        ` : `
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            ${works.map((w, i) => `
              <div class="gaming-card rounded-xl p-5 slide-in" style="animation-delay:${i*0.08}s">
                <div class="flex items-start justify-between mb-3">
                  <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:${cfg.secondary_action_color}20">
                      <i data-lucide="file-text" class="w-4 h-4" style="color:${cfg.secondary_action_color}"></i>
                    </div>
                    <h4 class="font-orbitron text-sm font-bold" style="color:${cfg.primary_action_color}">${w.work_title || 'Sin título'}</h4>
                  </div>
                  ${admin ? `<button onclick="deleteWork('${w.__backendId}')" class="btn-danger px-2 py-1 rounded text-xs">
                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                  </button>` : ''}
                </div>
                <p class="text-sm opacity-70 mb-3">${w.work_description || ''}</p>
                ${w.work_date ? `<p class="text-xs opacity-50 mb-2"><i data-lucide="calendar" class="w-3 h-3 inline mr-1"></i>${w.work_date}</p>` : ''}
                ${w.work_link ? `<a href="${w.work_link}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg mr-2" style="background:${cfg.primary_action_color}15;color:${cfg.primary_action_color};border:1px solid ${cfg.primary_action_color}30">
                  <i data-lucide="external-link" class="w-3 h-3"></i> Ver enlace
                </a>` : ''}
                ${w.work_file_name ? `<span class="inline-flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg" style="background:${cfg.secondary_action_color}15;color:${cfg.secondary_action_color};border:1px solid ${cfg.secondary_action_color}30">

                </span>` : ''}
              </div>
            `).join('')}
          </div>
        `}
      </div>
    `;
  }

  // Weeks overview
  return `
    <div class="slide-in">
      <div class="flex items-center justify-between mb-6">
        <div>
          <h3 class="font-orbitron text-lg font-bold" style="color:${cfg.primary_action_color}">UNIDAD ${unit.unit_number}: ${unit.unit_name || ''}</h3>
          <p class="text-sm opacity-60 mt-1">${unit.unit_description || ''}</p>
        </div>
        <div class="flex gap-2">
          ${admin && weeks.length < 4 ? `<button onclick="addWeek('${unit.__backendId}', ${weeks.length+1})" class="btn-cyber-primary px-4 py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="plus" class="w-3 h-3 inline mr-1"></i> SEMANA
          </button>` : ''}
          ${admin ? `<button onclick="deleteUnit('${unit.__backendId}')" class="btn-danger px-4 py-2 rounded-lg text-xs font-orbitron">
            <i data-lucide="trash-2" class="w-3 h-3 inline mr-1"></i> ELIMINAR
          </button>` : ''}
        </div>
      </div>

      ${weeks.length === 0 ? `
        <div class="text-center py-12 opacity-50">
          <i data-lucide="calendar-x" class="w-12 h-12 mx-auto mb-3" style="color:${cfg.primary_action_color}30"></i>
          <p class="font-orbitron text-xs">NO HAY SEMANAS EN ESTA UNIDAD</p>
          ${admin ? '<p class="text-xs mt-2">Agrega semanas con el botón de arriba (máx. 4)</p>' : ''}
        </div>
      ` : `
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          ${weeks.map((w, i) => {
            const workCount = appState.works.filter(wk => wk.parent_id === w.__backendId).length;
            return `
              <button onclick="appState.selectedWeek='${w.__backendId}';renderCurrentView();" class="gaming-card rounded-xl p-5 text-left slide-in group" style="animation-delay:${i*0.1}s">
                <div class="flex items-center justify-between mb-3">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center font-orbitron font-black" style="background:linear-gradient(135deg,${cfg.primary_action_color}20,${cfg.secondary_action_color}20);color:${cfg.primary_action_color}">
                      ${w.week_number}
                    </div>
                    <h4 class="font-orbitron font-bold text-sm" style="color:${cfg.primary_action_color}">SEMANA ${w.week_number}</h4>
                  </div>
                  <i data-lucide="chevron-right" class="w-4 h-4 opacity-40 group-hover:opacity-100 transition-opacity" style="color:${cfg.primary_action_color}"></i>
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-xs px-3 py-1 rounded-full" style="background:${cfg.secondary_action_color}15;color:${cfg.secondary_action_color};border:1px solid ${cfg.secondary_action_color}30">
                    ${workCount} trabajo${workCount !== 1 ? 's' : ''}
                  </span>
                </div>
                ${admin ? `<div class="mt-3 flex justify-end" onclick="event.stopPropagation();">
                  <button onclick="event.stopPropagation();deleteWeek('${w.__backendId}')" class="btn-danger px-2 py-1 rounded text-[10px] font-orbitron">
                    <i data-lucide="trash-2" class="w-3 h-3"></i>
                  </button>
                </div>` : ''}
              </button>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

// ========== ACTIONS ==========
function selectUnit(id) {
  appState.selectedUnit = id;
  appState.selectedWeek = null;
  renderCurrentView();
}

function showAddUnitModal() {
  const cfg = window.elementSdk?.config || defaultConfig;
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="gaming-card rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-orbitron text-lg font-bold mb-4" style="color:${cfg.primary_action_color}">NUEVA UNIDAD</h3>
        <form id="unit-form" class="space-y-4">
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="unit-num">Número</label>
            <input id="unit-num" type="number" min="1" class="input-cyber w-full px-4 py-2 rounded-lg text-sm" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="unit-name">Nombre</label>
            <input id="unit-name" type="text" class="input-cyber w-full px-4 py-2 rounded-lg text-sm" placeholder="Ej: Fundamentos de Programación" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="unit-desc">Descripción</label>
            <textarea id="unit-desc" class="input-cyber w-full px-4 py-2 rounded-lg text-sm" rows="2" placeholder="Descripción breve"></textarea>
          </div>
          <div class="flex gap-3">
            <button type="submit" id="unit-submit" class="btn-cyber-primary flex-1 py-2 rounded-lg font-orbitron text-sm">CREAR</button>
            <button type="button" onclick="closeModal()" class="btn-cyber flex-1 py-2 rounded-lg font-orbitron text-sm">CANCELAR</button>
          </div>
        </form>
      </div>
    </div>
  `;
  lucide.createIcons();
  document.getElementById('unit-form').addEventListener('submit', handleAddUnit);
}

async function handleAddUnit(e) {
  e.preventDefault();
  if (allRecords.length >= 999) { showToast('Límite de registros alcanzado', 'error'); return; }
  const btn = document.getElementById('unit-submit');
  btn.disabled = true; btn.textContent = 'CREANDO...';

  const result = await window.dataSdk.create({
    type: 'unit', name: '', email: '', password: '', role: '',
    unit_id: '', unit_name: document.getElementById('unit-name').value.trim(),
    unit_number: parseInt(document.getElementById('unit-num').value),
    unit_description: document.getElementById('unit-desc').value.trim(),
    week_id: '', week_number: 0, work_title: '', work_description: '',
    work_date: '', work_link: '', work_file_name: '', work_file_data: '', parent_id: ''
  });

  btn.disabled = false; btn.textContent = 'CREAR';
  if (result.isOk) { showToast('Unidad creada'); closeModal(); }
  else showToast('Error al crear', 'error');
}

async function addWeek(unitId, weekNum) {
  if (allRecords.length >= 999) { showToast('Límite alcanzado', 'error'); return; }
  const result = await window.dataSdk.create({
    type: 'week', name: '', email: '', password: '', role: '',
    unit_id: '', unit_name: '', unit_number: 0, unit_description: '',
    week_id: '', week_number: weekNum, work_title: '', work_description: '',
    work_date: '', work_link: '', work_file_name: '', work_file_data: '', parent_id: unitId
  });
  if (result.isOk) showToast(`Semana ${weekNum} creada`);
  else showToast('Error', 'error');
}

function showAddWorkModal(weekId) {
  const cfg = window.elementSdk?.config || defaultConfig;
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="gaming-card rounded-2xl p-6 w-full max-w-md mx-4">
        <h3 class="font-orbitron text-lg font-bold mb-4" style="color:${cfg.primary_action_color}">NUEVO TRABAJO</h3>
        <form id="work-form" class="space-y-4">
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="work-title">Título</label>
            <input id="work-title" type="text" class="input-cyber w-full px-4 py-2 rounded-lg text-sm" required>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="work-desc">Descripción</label>
            <textarea id="work-desc" class="input-cyber w-full px-4 py-2 rounded-lg text-sm" rows="2"></textarea>
          </div>
          <div>
            <label class="block text-xs font-orbitron mb-1" style="color:${cfg.primary_action_color}" for="work-date">Fecha</label>

            <button type="button" onclick="closeModal()" class="btn-cyber flex-1 py-2 rounded-lg font-orbitron text-sm">CANCELAR</button>
          </div>
        </form>
      </div>
    </div>
  `;
  lucide.createIcons();
  document.getElementById('work-form').addEventListener('submit', handleAddWork);
}

async function handleAddWork(e) {
  e.preventDefault();
  if (allRecords.length >= 999) { showToast('Límite alcanzado', 'error'); return; }
  const btn = document.getElementById('work-submit');
  btn.disabled = true; btn.textContent = 'GUARDANDO...';

  const fileInput = document.getElementById('work-file');
  const fileName = fileInput.files.length > 0 ? fileInput.files[0].name : '';

  const result = await window.dataSdk.create({
    type: 'work', name: '', email: '', password: '', role: '',
    unit_id: '', unit_name: '', unit_number: 0, unit_description: '',
    week_id: '', week_number: 0,
    work_title: document.getElementById('work-title').value.trim(),
    work_description: document.getElementById('work-desc').value.trim(),
    work_date: document.getElementById('work-date').value,
    work_link: document.getElementById('work-link').value.trim(),
    work_file_name: fileName, work_file_data: '',
    parent_id: document.getElementById('work-week-id').value
  });

  btn.disabled = false; btn.textContent = 'AGREGAR';
  if (result.isOk) { showToast('Trabajo agregado'); closeModal(); }
  else showToast('Error', 'error');
}

async function deleteUnit(id) {
  // Inline confirm
  const el = event.target.closest('button');
  if (!el.dataset.confirmed) {
    el.dataset.confirmed = 'true';
    el.innerHTML = '<i data-lucide="alert-triangle" class="w-3 h-3 inline mr-1"></i> ¿SEGURO?';
    el.classList.add('glow-pulse');
    lucide.createIcons();
    setTimeout(() => { delete el.dataset.confirmed; renderCurrentView(); }, 3000);
    return;
  }
  // Delete related weeks and works
  const weeks = appState.weeks.filter(w => w.parent_id === id);
  for (const w of weeks) {
    const works = appState.works.filter(wk => wk.parent_id === w.__backendId);
    for (const wk of works) await window.dataSdk.delete(wk);
    await window.dataSdk.delete(w);
  }
  const rec = allRecords.find(r => r.__backendId === id);
  if (rec) {
    const result = await window.dataSdk.delete(rec);
    if (result.isOk) {
      appState.selectedUnit = null;
      appState.selectedWeek = null;
      showToast('Unidad eliminada');
    }
  }
}

async function deleteWeek(id) {
  const el = event.target.closest('button');
  if (!el.dataset.confirmed) {
    el.dataset.confirmed = 'true';
    el.innerHTML = '¿SEGURO?';
    setTimeout(() => { delete el.dataset.confirmed; renderCurrentView(); }, 3000);
    return;
  }
  const works = appState.works.filter(w => w.parent_id === id);
  for (const w of works) await window.dataSdk.delete(w);
  const rec = allRecords.find(r => r.__backendId === id);
  if (rec) {
    const result = await window.dataSdk.delete(rec);
    if (result.isOk) showToast('Semana eliminada');
  }
}

async function deleteWork(id) {
  const el = event.target.closest('button');
  if (!el.dataset.confirmed) {
    el.dataset.confirmed = 'true';
    el.innerHTML = '¿SEGURO?';
    setTimeout(() => { delete el.dataset.confirmed; renderCurrentView(); }, 3000);
    return;
  }
  const rec = allRecords.find(r => r.__backendId === id);
  if (rec) {
    const result = await window.dataSdk.delete(rec);
    if (result.isOk) showToast('Trabajo eliminado');
  }
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

  defaultConfig,

      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || 'Orbitron',

    fontSizeable: {

      set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['welcome_text', config.welcome_text || defaultConfig.welcome_text]
  ])
});
