<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio Virtual Académico</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="/_sdk/data_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=Playfair+Display:wght@600;700&amp;display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"DM Sans"', 'system-ui', 'sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    .fade-in { animation: fadeIn 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-in { animation: slideIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
    .glow-pulse { animation: glowPulse 2s ease-in-out infinite; }
    @keyframes glowPulse { 0%, 100% { text-shadow: 0 0 20px rgba(34, 197, 94, 0.6), 0 0 40px rgba(16, 185, 129, 0.3); } 50% { text-shadow: 0 0 30px rgba(34, 197, 94, 0.9), 0 0 60px rgba(16, 185, 129, 0.6); } }
    .neon-border { animation: neonBorder 3s ease-in-out infinite; }
    @keyframes neonBorder { 0%, 100% { border-color: rgba(34, 197, 94, 0.2); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2), inset 0 0 10px rgba(34, 197, 94, 0.1); } 50% { border-color: rgba(34, 197, 94, 0.8); box-shadow: 0 0 30px rgba(34, 197, 94, 0.6), inset 0 0 20px rgba(34, 197, 94, 0.3); } }
    .hover-lift { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .hover-lift:hover { transform: translateY(-12px) scale(1.05); filter: drop-shadow(0 20px 40px rgba(34, 197, 94, 0.4)); }
    .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(34, 197, 94, 0.3), inset 0 0 20px rgba(34, 197, 94, 0.1); }
    input:focus, textarea:focus, select:focus { outline: none; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.5), inset 0 0 10px rgba(34, 197, 94, 0.2); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0810; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #22c55e, #10b981); border-radius: 4px; }
    .toast-anim { animation: toastSlide 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes toastSlide { from { opacity:0; transform:translateY(30px) scale(0.8); } to { opacity:1; transform:translateY(0) scale(1); } }
    .scanlines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0px, rgba(0,0,0,0.08) 2px, transparent 2px, transparent 4px); pointer-events: none; z-index: 1; }
    .cyber-glow { text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px rgba(34, 197, 94, 0.8); }
    .pulse-glow { animation: pulseGlow 1.5s ease-in-out infinite; }
    @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4); } 50% { box-shadow: 0 0 40px rgba(34, 197, 94, 0.8), inset 0 0 20px rgba(34, 197, 94, 0.2); } }
    .btn-pulse { animation: btnPulse 0.4s ease-out; }
    @keyframes btnPulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .float-anime { animation: floatAnime 3s ease-in-out infinite; }
    @keyframes floatAnime { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
    .glow-green { text-shadow: 0 0 10px #22c55e, 0 0 20px #10b981, 0 0 30px rgba(34, 197, 94, 0.6); }
    .shimmer { animation: shimmer 2s infinite; }
    @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
  <style>body { box-sizing: border-box; }</style>
 </head>
 <body class="h-full bg-[#0f0d1a] text-gray-100 font-body">
  <div id="app" class="h-full w-full flex flex-col overflow-hidden"></div><!-- Toast container -->
  <div id="toast-container" class="fixed bottom-4 right-4 z-[999] flex flex-col gap-2"></div>
  <script>
// ==================== STATE ====================
let allData = [];
let currentUser = null; // { username, role }
let darkMode = true;
let currentView = 'landing'; // landing | browse | login | signup | dashboard
let selectedUnit = null;
let selectedWeek = null;
let sidebarOpen = true;
let editingWork = null;
let showAddUnit = false;
let showAddWork = false;
let recordCount = 0;

const defaultConfig = {
  app_title: 'Portafolio Académico',
  welcome_message: 'Bienvenido al portafolio virtual académico',
  student_name: 'Ruiz Gcencho Kevin Jhampier',
  about_text: 'Desarrollador full-stack apasionado por la tecnología y la innovación. Especializado en crear experiencias digitales excepcionales.',
  background_color: '#0a0810',
  surface_color: '#1a1730',
  text_color: '#e2e0ef',
  primary_color: '#22c55e',
  secondary_color: '#10b981',
  font_family: 'DM Sans',
  font_size: 15
};

// ==================== HELPERS ====================
function getUnits() {
  return allData.filter(d => d.type === 'unit').sort((a,b) => (a.unit_num||0) - (b.unit_num||0));
}
function getWorksForWeek(unitId, weekNum) {
  return allData.filter(d => d.type === 'work' && d.unit_id === unitId && d.week_num === weekNum)
    .sort((a,b) => (a.date||'').localeCompare(b.date||''));
}
function getUsers() {
  return allData.filter(d => d.type === 'user');
}
function isAdmin() { return currentUser && currentUser.role === 'admin'; }
function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
  return 'h_' + Math.abs(h).toString(36);
}

function showToast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  const colors = type === 'error' ? 'bg-red-600' : type === 'warning' ? 'bg-amber-600' : 'bg-indigo-600';
  t.className = `toast-anim ${colors} text-white px-4 py-3 rounded-lg shadow-lg text-sm font-medium max-w-xs`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ==================== DATA SDK ====================
const dataHandler = {
  onDataChanged(data) {
    allData = data;
    recordCount = data.length;
    // Ensure admin user exists check
    const users = getUsers();
    const adminExists = users.some(u => u.username === 'admin');
    if (!adminExists && recordCount === 0) {
      // We'll prompt user to seed admin on first interaction
    }
    render();
  }
};

async function initApp() {
  const r = await window.dataSdk.init(dataHandler);
  if (!r.isOk) { console.error('SDK init failed'); }
}
initApp();

async function createRecord(obj) {
  if (recordCount >= 999) { showToast('Límite de registros alcanzado (999)', 'warning'); return false; }
  const r = await window.dataSdk.create(obj);
  if (!r.isOk) { showToast('Error al guardar', 'error'); return false; }
  return true;
}
async function deleteRecord(record) {
  const r = await window.dataSdk.delete(record);
  if (!r.isOk) { showToast('Error al eliminar', 'error'); return false; }
  return true;
}
async function updateRecord(record) {
  const r = await window.dataSdk.update(record);
  if (!r.isOk) { showToast('Error al actualizar', 'error'); return false; }
  return true;
}

// ==================== ELEMENT SDK ====================
const cfg = { ...defaultConfig };

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    Object.assign(cfg, config);
    applyTheme();
    render();
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_color || defaultConfig.primary_color, set: v => { config.primary_color = v; window.elementSdk.setConfig({ primary_color: v }); } },
      { get: () => config.secondary_color || defaultConfig.secondary_color, set: v => { config.secondary_color = v; window.elementSdk.setConfig({ secondary_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family,
      set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size,
      set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title],
    ['welcome_message', config.welcome_message || defaultConfig.welcome_message],
    ['student_name', config.student_name || defaultConfig.student_name],
    ['about_text', config.about_text || defaultConfig.about_text]
  ])
});

function applyTheme() {
  const bg = cfg.background_color || defaultConfig.background_color;
  const txt = cfg.text_color || defaultConfig.text_color;
  document.body.style.backgroundColor = bg;
  document.body.style.color = txt;
  document.body.style.fontFamily = `${cfg.font_family || defaultConfig.font_family}, DM Sans, system-ui, sans-serif`;
}
applyTheme();

// ==================== RENDER ====================
function render() {
  const app = document.getElementById('app');
  if (currentView === 'landing') return renderLanding(app);
  if (currentView === 'browse') return renderBrowse(app);
  if (currentView === 'login') return renderLogin(app);
  if (currentView === 'signup') return renderSignup(app);
  renderDashboard(app);
}

// -------- LANDING --------
function renderLanding(app) {
  const pc = cfg.primary_color || defaultConfig.primary_color;
  const sc = cfg.surface_color || defaultConfig.surface_color;
  const bs = cfg.font_size || defaultConfig.font_size;
  const units = getUnits();

  app.innerHTML = `
    <div class="h-full w-full flex flex-col overflow-hidden p-4" style="background: linear-gradient(135deg, #000000 0%, #001a08 25%, #0a0810 50%, #001a08 75%, #000000 100%); position: relative;">
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.04; background-image: linear-gradient(0deg, transparent 24%, rgba(34, 197, 94, 0.1) 25%, rgba(34, 197, 94, 0.1) 26%, transparent 27%, transparent 74%, rgba(34, 197, 94, 0.1) 75%, rgba(34, 197, 94, 0.1) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(34, 197, 94, 0.1) 25%, rgba(34, 197, 94, 0.1) 26%, transparent 27%, transparent 74%, rgba(34, 197, 94, 0.1) 75%, rgba(34, 197, 94, 0.1) 76%, transparent 77%, transparent); background-size: 60px 60px; pointer-events: none; z-index: 0;"></div>
      <div class="scanlines"></div>
      <div class="relative z-10 h-full flex flex-col overflow-y-auto">
        <!-- HEADER CON LOGO Y NOMBRE -->
        <div class="text-center py-8">
          <div class="inline-flex items-center justify-center w-28 h-28 rounded-3xl mb-6 pulse-glow relative overflow-hidden" style="background: linear-gradient(135deg, #22c55e 0%, #10b981 100%); box-shadow: 0 0 60px rgba(34, 197, 94, 0.8);">
            <div class="absolute inset-0 flex items-center justify-center">
              <span class="text-5xl float-anime">✨</span>
            </div>
            <i data-lucide="code-2" class="w-16 h-16 text-white relative z-10"></i>
          </div>
          <h1 class="font-heading font-black glow-green" style="font-size: ${bs * 2.8}px; background: linear-gradient(135deg, #22c55e, #10b981, #22c55e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; letter-spacing: 0.05em;">${cfg.student_name || defaultConfig.student_name}</h1>
          <p style="font-size: ${bs * 1.1}px; color: #10b981; margin-top: 0.5rem; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 700;">📚 PORTAFOLIO ACADÉMICO</p>
          <p style="font-size: ${bs}px; opacity: 0.7; margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto; line-height: 1.6;">${cfg.about_text || defaultConfig.about_text}</p>
        </div>

        <!-- SECCIÓN SOBRE MI CON ANIMACIÓN -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 my-8 px-4 max-w-4xl mx-auto">
          <div class="hover-lift rounded-2xl p-6 border-2 neon-border text-center" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%); border-color: rgba(34, 197, 94, 0.3);">
            <i data-lucide="zap" class="w-8 h-8 mx-auto mb-3 text-green-400" style="text-shadow: 0 0 10px #22c55e;"></i>
            <h3 class="font-bold cyber-glow" style="font-size: ${bs * 1.05}px; color: #22c55e;">Innovador</h3>
            <p style="font-size: ${bs * 0.8}px; opacity: 0.6; margin-top: 0.5rem;">Creando soluciones creativas</p>
          </div>
          <div class="hover-lift rounded-2xl p-6 border-2 neon-border text-center" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%); border-color: rgba(34, 197, 94, 0.3);">
            <i data-lucide="rocket" class="w-8 h-8 mx-auto mb-3 text-green-400" style="text-shadow: 0 0 10px #22c55e;"></i>
            <h3 class="font-bold cyber-glow" style="font-size: ${bs * 1.05}px; color: #22c55e;">Rápido</h3>
            <p style="font-size: ${bs * 0.8}px; opacity: 0.6; margin-top: 0.5rem;">Entrega eficiente y ágil</p>
          </div>
          <div class="hover-lift rounded-2xl p-6 border-2 neon-border text-center" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%); border-color: rgba(34, 197, 94, 0.3);">
            <i data-lucide="star" class="w-8 h-8 mx-auto mb-3 text-green-400" style="text-shadow: 0 0 10px #22c55e;"></i>
            <h3 class="font-bold cyber-glow" style="font-size: ${bs * 1.05}px; color: #22c55e;">Calidad</h3>
            <p style="font-size: ${bs * 0.8}px; opacity: 0.6; margin-top: 0.5rem;">Excelencia en todo</p>
          </div>
        </div>

        <!-- UNIDADES PREVIEW -->
        <div class="flex-1 overflow-y-auto px-2 sm:px-8 py-6 flex flex-col items-center justify-center">
          ${units.length === 0 ? `<div class="text-center"><i data-lucide="lock" class="w-20 h-20 mx-auto mb-4 opacity-20"></i><p style="font-size: ${bs}px; opacity: 0.4;">Inicia sesión para explorar las unidades</p></div>` : `<div class="max-w-6xl w-full"><p style="font-size: ${bs * 0.85}px; opacity: 0.5; margin-bottom: 2rem; text-transform: uppercase; letter-spacing: 0.1em; color: #22c55e; font-weight: 700;">► ${units.length} UNIDADES DISPONIBLES ◄</p><div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">${units.map((u, i) => `<div class="fade-in hover-lift rounded-2xl p-6 border-2 neon-border group cursor-pointer overflow-hidden" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%); border-color: rgba(34, 197, 94, 0.3); animation-delay: ${i * 0.15}s; position: relative;"><div style="position: absolute; top: -50%; right: -50%; width: 200px; height: 200px; background: radial-gradient(circle, rgba(34, 197, 94, 0.1), transparent); group-hover:opacity: 1;" class="opacity-0 transition-opacity duration-300"></div><div class="relative z-1"><div class="flex items-center justify-between mb-4"><div class="w-14 h-14 rounded-xl flex items-center justify-center font-black text-white text-lg" style="background: linear-gradient(135deg, #22c55e, #10b981); box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);">U${u.unit_num}</div><i data-lucide="zap" class="w-6 h-6 text-green-400 opacity-70 animate-pulse"></i></div><h3 class="font-heading font-bold mb-2 cyber-glow" style="font-size: ${bs * 1.15}px; color: #22c55e;">Unidad ${u.unit_num}</h3><p class="text-sm opacity-60 mb-4 h-10 line-clamp-2">${u.unit_title || 'Sin título'}</p><div class="flex items-center gap-2 text-xs opacity-50 font-mono"><i data-lucide="layers" class="w-4 h-4"></i><span>4 SEMANAS</span></div></div></div>`).join('')}</div></div>`}
        </div>

        <!-- FOOTER CON BOTONES -->
        <div class="text-center py-8 space-y-3 border-t px-4" style="border-color: rgba(34, 197, 94, 0.2);"><div class="flex gap-3 justify-center flex-wrap"><button id="land-browse-btn" class="px-8 py-3 rounded-xl font-black text-white transition-all hover:scale-110 uppercase tracking-wider" style="background: linear-gradient(135deg, #10b981 0%, #059669 100%); font-size: ${bs}px; box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); border: 2px solid rgba(34, 197, 94, 0.8);">👁️ Explorar</button><button id="land-login-btn" class="px-8 py-3 rounded-xl font-black text-white transition-all hover:scale-110 uppercase tracking-wider" style="background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%); font-size: ${bs}px; box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); border: 2px solid rgba(34, 197, 94, 0.8);">🔓 INGRESAR</button></div><p style="font-size: ${bs * 0.8}px; opacity: 0.4; margin-top: 1rem; text-transform: uppercase; letter-spacing: 0.08em;">¿SIN CUENTA? REGÍSTRATE ↓</p></div>
      </div>
    </div>`;
  lucide.createIcons();
  document.getElementById('land-browse-btn').addEventListener('click', () => { currentView = 'browse'; render(); });
  document.getElementById('land-login-btn').addEventListener('click', () => { currentView = 'login'; render(); });
}

// -------- BROWSE (SIN LOGIN) --------
function renderBrowse(app) {
  const pc = cfg.primary_color || defaultConfig.primary_color;
  const sc = cfg.surface_color || defaultConfig.surface_color;
  const bg = cfg.background_color || defaultConfig.background_color;
  const tc = cfg.text_color || defaultConfig.text_color;
  const sc2 = cfg.secondary_color || defaultConfig.secondary_color;
  const bs = cfg.font_size || defaultConfig.font_size;
  const units = getUnits();

  app.innerHTML = `
    <div class="h-full w-full flex flex-col overflow-hidden" style="background: linear-gradient(135deg, #000000 0%, #001a08 25%, #0a0810 50%, #001a08 75%, #000000 100%); position: relative;">
      <div class="scanlines"></div>
      <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.03; background-image: linear-gradient(0deg, transparent 24%, rgba(34, 197, 94, 0.1) 25%, rgba(34, 197, 94, 0.1) 26%, transparent 27%, transparent 74%, rgba(34, 197, 94, 0.1) 75%, rgba(34, 197, 94, 0.1) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(34, 197, 94, 0.1) 25%, rgba(34, 197, 94, 0.1) 26%, transparent 27%, transparent 74%, rgba(34, 197, 94, 0.1) 75%, rgba(34, 197, 94, 0.1) 76%, transparent 77%, transparent); background-size: 60px 60px; pointer-events: none; z-index: 0;"></div>
      
      <!-- Header -->
      <div class="relative z-10 flex items-center justify-between px-6 py-4 border-b" style="border-color: rgba(34, 197, 94, 0.2); background: linear-gradient(90deg, rgba(34, 197, 94, 0.05) 0%, transparent 100%);">
        <div class="flex items-center gap-3">
          <div class="w-12 h-12 rounded-lg flex items-center justify-center font-black text-white" style="background: linear-gradient(135deg, #22c55e, #10b981); box-shadow: 0 0 20px rgba(34, 197, 94, 0.5);">
            <i data-lucide="book-open" class="w-6 h-6"></i>
          </div>
          <div>
            <div class="font-heading font-bold cyber-glow" style="font-size: ${bs * 1.2}px; color: #22c55e;">${cfg.app_title || defaultConfig.app_title}</div>
            <div class="text-xs opacity-40 uppercase tracking-widest">MODO VISUALIZACIÓN</div>
          </div>
        </div>
        <button id="browse-back-btn" class="flex items-center gap-2 px-4 py-2 rounded-lg hover:opacity-80 transition font-mono text-sm uppercase" style="color: #10b981;">
          <i data-lucide="arrow-left" class="w-4 h-4"></i> ATRÁS
        </button>
      </div>

      <!-- Content -->
      <div class="relative z-10 flex-1 overflow-y-auto p-6">
        <div class="max-w-6xl mx-auto">
          <h2 style="font-size: ${bs * 1.5}px; font-weight: 900; background: linear-gradient(135deg, #22c55e, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 1.5rem; text-transform: uppercase; letter-spacing: 0.05em;">📚 CATÁLOGO DE UNIDADES</h2>
          
          ${units.length === 0 ? `
            <div class="flex items-center justify-center py-20 text-center">
              <div>
                <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 opacity-20"></i>
                <p style="font-size: ${bs}px; opacity: 0.4;">No hay unidades disponibles aún</p>
              </div>
            </div>
          ` : `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
              ${units.map((u, i) => `
                <div class="fade-in hover-lift rounded-3xl p-8 border-2 neon-border group overflow-hidden cursor-pointer transition-all" data-unit-browse="${u.__backendId}" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, rgba(16, 185, 129, 0.08) 100%); border-color: rgba(34, 197, 94, 0.3); animation-delay: ${i * 0.1}s;">
                  <div style="position: absolute; top: -100px; right: -100px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(34, 197, 94, 0.2), transparent); filter: blur(40px); pointer-events: none;"></div>
                  <div class="relative z-1">

async function handleLogin(e) {
  e.preventDefault();
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  if (!user || !pass) return;

  const hash = simpleHash(pass);
  const users = getUsers();

  // Auto-create admin if not exists
  if (user === 'admin' && pass === 'admin123') {
    const existing = users.find(u => u.username === 'admin');
    if (!existing) {
      await createRecord({ type: 'user', username: 'admin', role: 'admin', password_hash: simpleHash('admin123'), title:'', description:'', date:'', link:'', unit_id:'', week_num:0, unit_num:0, unit_title:'' });
      // Wait for data refresh
      showToast('Cuenta admin creada. Inicia sesión de nuevo.');
      return;
    }
  }

  // Re-fetch after possible create
  const freshUsers = allData.filter(d => d.type === 'user');
  const found = freshUsers.find(u => u.username === user && u.password_hash === hash);
  if (found) {
    currentUser = { username: found.username, role: found.role };
    currentView = 'dashboard';
    selectedUnit = null;
    selectedWeek = null;
    render();
    showToast(`¡Hola, ${currentUser.username}!`);
  } else {
    showToast('Credenciales incorrectas', 'error');
  }
}

async function handleSignup(e) {
  e.preventDefault();
  const user = document.getElementById('su-user').value.trim();
  const pass = document.getElementById('su-pass').value;
  if (!user || pass.length < 4) { showToast('Contraseña mínima: 4 caracteres', 'error'); return; }

  const existing = getUsers().find(u => u.username === user);

  const ok = await createRecord({ type:'user', username:user, role:'viewer', password_hash:simpleHash(pass), title:'', description:'', date:'', link:'', unit_id:'', week_num:0, unit_num:0, unit_title:'' });
  if (ok) {
    showToast('¡Cuenta creada! Inicia sesión.');
    currentView = 'login';
    render();
  }

              ${wk.works.length === 0 ? `<p class="text-sm opacity-30 col-span-full py-2">Sin trabajos en esta semana</p>` :
                wk.works.map(work => `
                  <div class="card-hover rounded-xl p-4 relative group" style="background:${bg}; border:1px solid ${sc2};">
                    <div class="flex items-start justify-between gap-2 mb-2">
                      <h3 class="font-semibold truncate" style="font-size:${bs}px;">${work.title||'Sin título'}</h3>

                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition flex-shrink-0">
                          <button class="edit-work-btn p-1 rounded hover:opacity-80" data-wid="${work.__backendId}" style="color:${pc};"><i data-lucide="edit" class="w-3.5 h-3.5"></i></button>
                          <button class="del-work-btn p-1 rounded hover:opacity-80 text-red-400" data-wid="${work.__backendId}"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                        </div>` : ''}
                    </div>
                    <p class="text-xs opacity-50 mb-2 line-clamp-2" style="font-size:${bs*0.8}px;">${work.description||'Sin descripción'}</p>
                    <div class="flex items-center justify-between">
                      <span class="text-xs opacity-40"><i data-lucide="calendar" class="w-3 h-3 inline"></i> ${work.date||'—'}</span>
                      ${work.link ? `<a href="${work.link}" target="_blank" rel="noopener noreferrer" class="text-xs font-medium hover:underline" style="color:${pc};"><i data-lucide="external-link" class="w-3 h-3 inline"></i> Ver</a>` : ''}
                    </div>
                  </div>
                `).join('')}
            </div>
          </details>
        `).join('')}
      </div>
    </div>`;
}

// -------- EVENTS --------
function bindDashboardEvents() {
  // Mobile menu
  const menuBtn = document.getElementById('mobile-menu-btn');
  const overlay = document.getElementById('sidebar-overlay');
  if (menuBtn) menuBtn.addEventListener('click', () => { sidebarOpen = !sidebarOpen; render(); });
  if (overlay) overlay.addEventListener('click', () => { sidebarOpen = false; render(); });

  // Logout
  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.addEventListener('click', () => { currentUser = null; currentView = 'login'; selectedUnit = null; render(); });

  // Unit selection
  document.querySelectorAll('.unit-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      if (e.target.closest('.del-unit')) return;
      const uid = btn.dataset.uid;
      selectedUnit = allData.find(d => d.__backendId === uid);
      selectedWeek = null;
      if (window.innerWidth < 1024) sidebarOpen = false;
      render();
    });
  });

  // Delete unit (with inline confirm)
  document.querySelectorAll('.del-unit').forEach(el => {
    el.addEventListener('click', async (e) => {
      e.stopPropagation();
      const uid = el.dataset.delUid;
      const unit = allData.find(d => d.__backendId === uid);
      if (!unit || !isAdmin()) return;
      // Delete all works in this unit first
      const works = allData.filter(d => d.type === 'work' && d.unit_id === uid);
      for (const w of works) await deleteRecord(w);
      await deleteRecord(unit);
      if (selectedUnit && selectedUnit.__backendId === uid) selectedUnit = null;
      showToast('Unidad eliminada');
    });
  });

  // Add unit
  const addUnitBtn = document.getElementById('add-unit-btn');
  if (addUnitBtn) addUnitBtn.addEventListener('click', () => { showAddUnit = true; render(); });
  const cancelAddUnit = document.getElementById('cancel-add-unit');
  if (cancelAddUnit) cancelAddUnit.addEventListener('click', () => { showAddUnit = false; render(); });
  const addUnitForm = document.getElementById('add-unit-form');
  if (addUnitForm) addUnitForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const num = parseInt(document.getElementById('au-num').value);
    const title = document.getElementById('au-title').value.trim();
    if (!title) return;
    const ok = await createRecord({ type:'unit', unit_num:num, unit_title:title, title:'', description:'', date:'', link:'', unit_id:'', week_num:0, username:'', role:'', password_hash:'' });
    if (ok) { showAddUnit = false; showToast('Unidad creada'); }
  });

  // Add work buttons
  document.querySelectorAll('.add-work-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      selectedWeek = parseInt(btn.dataset.week);
      showAddWork = true;
      render();
    });
  });
  const cancelAddWork = document.getElementById('cancel-add-work');
  if (cancelAddWork) cancelAddWork.addEventListener('click', () => { showAddWork = false; render(); });
  const addWorkForm = document.getElementById('add-work-form');
  if (addWorkForm) addWorkForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const title = document.getElementById('aw-title').value.trim();
    const desc = document.getElementById('aw-desc').value.trim();
    const date = document.getElementById('aw-date').value;
    const link = document.getElementById('aw-link').value.trim();
    if (!title) return;
    const ok = await createRecord({ type:'work', title, description:desc, date, link, unit_id:selectedUnit.__backendId, week_num:selectedWeek, unit_num:0, unit_title:'', username:'', role:'', password_hash:'' });
    if (ok) { showAddWork = false; showToast('Trabajo añadido'); }
  });

  // Edit work
  document.querySelectorAll('.edit-work-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const wid = btn.dataset.wid;
      editingWork = allData.find(d => d.__backendId === wid);
      render();
    });
  });
  const cancelEditWork = document.getElementById('cancel-edit-work');
  if (cancelEditWork) cancelEditWork.addEventListener('click', () => { editingWork = null; render(); });
  const editWorkForm = document.getElementById('edit-work-form');
  if (editWorkForm) editWorkForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const updated = { ...editingWork,
      title: document.getElementById('ew-title').value.trim(),
      description: document.getElementById('ew-desc').value.trim(),
      date: document.getElementById('ew-date').value,
      link: document.getElementById('ew-link').value.trim()
    };
    const ok = await updateRecord(updated);
    if (ok) { editingWork = null; showToast('Trabajo actualizado'); }
  });

  // Delete work
  document.querySelectorAll('.del-work-btn').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const wid = btn.dataset.wid;
      const work = allData.find(d => d.__backendId === wid);
      if (work && isAdmin()) {
        await deleteRecord(work);
        showToast('Trabajo eliminado');
      }
    });
  });
}

// Initial render
render();
